<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>捞鱼 · 学习与工具</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Poppins:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--cream:#FAF6EB;--paper:#F3EDDD;--forest:#1E3A24;--sage:#AFCDA8;--ink:#1A2018;--marker:#F5E08A;--brick:#B5482A;--font-display:"Archivo Black","Noto Sans SC","PingFang SC",sans-serif;--font-head:"Poppins","Noto Sans SC","PingFang SC",sans-serif;--font-body:-apple-system,"PingFang SC","Noto Sans SC",sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}body{font-family:var(--font-body);background:var(--cream);color:var(--ink);line-height:1.7;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
#g-card{background:var(--paper);border:2px solid var(--forest);border-radius:18px;padding:36px 32px;max-width:380px;width:100%;text-align:center;box-shadow:0 6px 24px rgba(30,58,36,.12);}
#g-mascot{width:72px;height:72px;object-fit:contain;margin:0 auto 14px;display:block;filter:drop-shadow(2px 2px 0 rgba(30,58,36,.2));}
#g-title{font-family:var(--font-display);font-size:22px;color:var(--forest);margin-bottom:6px;}
#g-hint{font-size:14px;color:#777;margin-bottom:20px;}
/* 表单：用标准 form + input name，让浏览器记住密码 */
form{width:100%;}
#g-in{width:100%;padding:14px 16px;font-size:16px;border:2px solid var(--sage);border-radius:999px;background:#fff;color:var(--ink);font-family:var(--font-body);outline:none;text-align:center;}
#g-in:focus{border-color:var(--forest);}
#g-btn{margin-top:14px;width:100%;padding:13px;border:none;border-radius:999px;background:var(--forest);color:var(--cream);font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font-body);}
#g-btn:hover{opacity:.9;}
#g-err{color:var(--brick);font-size:13px;margin-top:12px;min-height:18px;opacity:0;transition:opacity .2s;}
#g-err.show{opacity:1;}
@keyframes gShake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-7px);}40%,80%{transform:translateX(7px);}}
.shake #g-card{animation:gShake .4s;}
</style>
</head>
<body>
<div id="g-box">
  <div id="g-card">
    <img id="g-mascot" src="img/sticker/mascot.png" alt="">
    <div id="g-title">🔐 学习与工具</div>
    <div id="g-hint">密码提示：开发者姓名</div>
    <!-- 标准表单：浏览器可记住密码（autocomplete 开启、input 有 name） -->
    <form id="g-form" action="home.html" autocomplete="on">
      <input id="g-in" name="gate-pw" type="password" placeholder="请输入密码" autofocus>
      <button id="g-btn" type="submit">进入</button>
    </form>
    <div id="g-err">密码不对，再想想</div>
  </div>
</div>
<script>
(function(){
  "use strict";
  // 版本检测：内联版本号 vs version.json，不一致就刷新（解决CDN缓存旧HTML的问题）
  var PAGE_V = 29;
  fetch('version.json?t='+Date.now(),{cache:'no-store'}).then(function(r){return r.json();}).then(function(d){
    if(PAGE_V!==d.v){
      var alreadyRefreshed=false;
      try{alreadyRefreshed=sessionStorage.getItem('weshoto_refreshed')==='1';}catch(e){}
      if(alreadyRefreshed){
        console.warn('[version] still mismatch after refresh: PAGE_V='+PAGE_V+' remote='+d.v+' — stopping to avoid loop');
        return;
      }
      try{sessionStorage.setItem('weshoto_refreshed','1');}catch(e){}
      setTimeout(function(){location.reload(true);},800);
    } else {
      try{sessionStorage.removeItem('weshoto_refreshed');}catch(e){}
    }
  }).catch(function(){});

  var box = document.getElementById('g-box');
  var form = document.getElementById('g-form');
  var input = document.getElementById('g-in');
  var errEl = document.getElementById('g-err');

  function shake(){
    box.classList.add('shake');
    errEl.classList.add('show');
    input.value = '';
    input.focus();
    setTimeout(function(){ box.classList.remove('shake'); }, 450);
  }

  // 密码门：纯比对 + 跳转（中间页隔离方案，不再加密）
  var GATE_PW = '泽恩';
  function tryUnlock(pw){
    if(pw === GATE_PW){
      location.href = 'home.html';
    } else {
      shake();
    }
  }

  form.addEventListener('submit', function(e){
    e.preventDefault();
    tryUnlock(input.value);
  });
})();
</script>
<link rel="stylesheet" href="promo.css">
<script src="promo.js"></script>
</body>
</html>
